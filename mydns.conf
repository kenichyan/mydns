# ==========================================
# MyDNS.JP Configuration
# ==========================================

# Credentials: ("ID:Password" "ID:Password" ...)
# You can add multiple domain credentials separated by space.
MYDNS_CREDENTIALS=(
    "mydns123456:PasswordA"
    "mydns789012:PasswordB"
)

# Enable/Disable update settings (yes/no)
ENABLE_IPV4="yes"
ENABLE_IPV6="yes"

# Update target URLs for MyDNS.JP
IPV4_URL="http://ipv4.mydns.jp/login.html"
IPV6_URL="http://ipv6.mydns.jp/login.html"

# External APIs to detect current global IP address
# Using lightweight services to reduce load on MyDNS.JP servers.
CHECK_IPV4_URL="https://ipv4.icanhazip.com"
CHECK_IPV6_URL="https://ipv6.icanhazip.com"

# Timeout settings (seconds)
TIMEOUT=15
CONN_TIMEOUT=10

# Runtime environment settings
USER_AGENT="MyDNS-Update-Script/1.4"
LOG_FILE="/var/log/mydns_update.log"

# Cache directory (Stores previous IP for each ID)
# Used to determine if an update is necessary or 24 hours have passed.
CACHE_DIR="/var/cache/mydns"
